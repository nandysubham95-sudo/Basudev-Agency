<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - To-Do List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="app-container">
            <!-- Header -->
            <header class="header">
                <h1>📝 TaskMaster</h1>
                <p class="subtitle">Organize your tasks efficiently</p>
            </header>

            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">+ Add Task</button>
                </div>
                <div class="priority-selector">
                    <label for="prioritySelect">Priority:</label>
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <!-- Filter and Sort Section -->
            <div class="controls-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn" id="sortBtn" title="Sort by priority">🔄 Sort</button>
                    <button class="clear-btn" id="clearCompletedBtn">🗑️ Clear Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Pending:</span>
                    <span class="stat-value" id="pendingTasks">0</span>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="tasks-section">
                <ul id="taskList" class="task-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">✨</div>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Footer -->
            <footer class="footer">
                <p>All tasks are automatically saved to your browser</p>
                <div class="footer-actions">
                    <button id="exportBtn" class="footer-btn">📥 Export Tasks</button>
                    <button id="importBtn" class="footer-btn">📤 Import Tasks</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </footer>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
